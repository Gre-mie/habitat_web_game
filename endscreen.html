<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <title>End game</title>
  </head>
  <body class="game">
    <div id="end-basic-info" 
      class="section margin-top"
      data-habitat=""
      data-status=""
      data-condition=""
      data-frames=""
      data-population=""
      data-food=""
      data-wood=""
      data-stone=""
      
    >
      <h1 id="end-status"></h1>
      <p id="end-condition"></p>

      <div>
        <ul>
          <li id="end-frames"></li>
          <li id="end-population"></li>
          <li id="end-food"></li>
          <li id="end-wood"></li>
          <li id="end-stone"></li>
        </ul>
      </div>

    </div>

    <hr>

    <div id="log" class="section">
      <h2>Last years log:</h2>

      <p class="sub-heading">Gathered:</p>
      <ul>
        <li>Food: <span class="log-food"></span>
          <span class="sub-text">(meat: <span class="log-gather-meat"></span> foraged: <span class="log-gather-forage"></span>)</span>
        </li>
      
        <li>Wood: <span class="log-wood"></span></li>
        <li>Stone: <span class="log-stone"></span></li>
      </ul>

      <p class="sub-heading">Population:</p>
      <ul>
        <li>Sick: <span class="log-sick"></span></li>
        <li>Children born: <span class="log-born"></span></li>
        <li>Children aged: <span class="log-grew"></span></li>
        <li>Adults aged: <span class="log-aged"></span></li>
        <li>Deaths: <span class="log-deaths"></span>
          <span class="sub-text">(sickness: <span class="log-sickness"></span> starvation: <span class="log-starvation"></span> oldage: <span class="log-oldage"></span>)</span>
        </li>
      </ul>
      <p class="sub-heading">Buildings:</p>
      <ul>
        <li>Shelter gained: <span class="log-shelter"></span>
          <span class="sub-text">(shack: <span class="log-shack"></span> house: <span class="log-house"></span> manor: <span class="log-manor"></span>)</span>
        </li>
        <li>Wood spent: <span class="log-wood-spent"></span></li>
        <li>Stone spent: <span class="log-stone-spent"></span></li>
      </ul>

    </div>

    <div class="container-horizontal-center">
      <a id="new-game-button" class="button" href="index.html">New Game</a>
    </div>
    

    <script src="endgame.js"></script>
  </body>
</html>
