<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./styles.css">
    <title>Habitate - game</title>
  </head>
  <body id="game">

    <div id="habitat-title">
      <h1>.</h1>
      <span>year: <span class="info-frames"></span></span>
    </div>

    <div id="board" 
      data-frames=0 
      data-children=0 
      data-adults=5 
      data-old=0 

      data-food=20 
      data-wood=10 
      data-stone=10
      data-shelter=0
    >
      
      <div class="section">
        <table id="basic-info">
          <tr>
            <td>Children: <span class="info-children"></span></td>
            <td>Adults: <span class="info-adults"></span></td>
            <td>Elderly: <span class="info-old"></span></td>
          </tr>
          <tr id="basic-info-resources">
            <td>Food: <span class="info-food"></span></td>
            <td>Wood: <span class="info-wood"></span></td>
            <td>Stone: <span class="info-stone"></span></td>
          </tr>
        </table>
      </div>

      <div class="section">
        <h2>Workers: <span class="var-workers"></span></h2>
        <p id="worker-visual-display"></p>
        <p class="sub-text">Pairs of unasigned workers will have a chnace to breed</p>
      </div>



    </div>

    <hr id="hr">

    <div id="log">
    </div>

    <button>Done</button>

    <script src="index.js"></script>
  </body>
</html>
