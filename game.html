<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="./styles.css">
    <title>Habitate - game</title>
  </head>
  <body id="game">

    <div id="habitat-title">
      <h1>.</h1>
      <span>Year: <span class="info-frames"></span></span>
    </div>

    <div id="board" 
      data-frames=0 
      data-children=0 
      data-adults=5 
      data-old=0 

      data-food=20 
      data-wood=10 
      data-stone=10
      data-shelter=0
    >
      
      <div class="section">
        <table>
          <tr>
            <td>👶: <span class="info-children"></span></td>
            <td>🧔: <span class="info-adults"></span></td>
            <td>👴: <span class="info-old"></span></td>
            <td>🤮: <span class="log-sick"></span></td>
          </tr>
        </table>
        <table>
          <tr>
            <td>Food: <span class="info-food"></span></td>
            <td>Wood: <span class="info-wood"></span></td>
            <td>Stone: <span class="info-stone"></span></td>
          </tr>
        </table>
      </div>

      <div class="section">
        <h2>Workers: <span class="var-workers"></span></h2>
        <p id="worker-visual-display"></p>
        <p class="sub-text">Pairs of unasigned workers will have a chnace to breed</p>
      </div>




    </div>

    <hr id="hr">

    <button>Done</button>

    <div id="log" 
      class="section"

      data-food=0
      data-meat=0
      data-forage=0
      data-wood=0
      data-stone=0

      data-sick=0
      data-born=0
      data-grew=0
      data-deaths=0
      data-sickness=0
      data-oldage=0>

      <h3>Previous year: </h3>
      <p class="sub-heading">Gathered:</p>
      <ul>
        <li>Food: <span class="log-food"></span>
          <span class="sub-text">(meat: <span class="log-gather-meat"></span> foraged: <span class="log-gather-forage"></span>)</span>
        </li>
        <li>Wood: <span class="log-wood"></span></li>
        <li>Stone: <span class="log-stone"></span></li>
      </ul>

      <p class="sub-heading">Population:</p>
      <ul>
        <li>Sick: <span class="log-sick"></span></li>
        <li>Children born: <span class="log-born"></span></li>
        <li>Children grew: <span class="log-grew"></span></li>
        <li>Deaths: <span class="log-deaths"></span>
          <span class="sub-text">(sickness: <span class="log-sickness"></span> oldage: <span class="log-oldage"></span>)</span>
        </li>
      </ul>
      


    </div>


    <script src="index.js"></script>
  </body>
</html>
